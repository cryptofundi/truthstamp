<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - TruthStamp</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-zinc-100">
  <div class="flex h-screen">
    <!-- Sidebar -->
    <div class="w-64 bg-white border-r p-6 flex flex-col">
      <div class="flex items-center gap-2 text-2xl font-bold mb-10">
        TruthStamp
      </div>
      <nav class="space-y-2">
        <a href="#" class="flex items-center gap-3 px-4 py-3 bg-blue-50 text-blue-700 rounded-2xl font-medium"><i class="fas fa-home"></i> Dashboard</a>
        <a href="upload.html" class="flex items-center gap-3 px-4 py-3 hover:bg-zinc-100 rounded-2xl"><i class="fas fa-plus"></i> Stamp New</a>
        <a href="#" class="flex items-center gap-3 px-4 py-3 hover:bg-zinc-100 rounded-2xl"><i class="fas fa-list"></i> My Stamps</a>
        <a href="#" class="flex items-center gap-3 px-4 py-3 hover:bg-zinc-100 rounded-2xl"><i class="fas fa-chart-bar"></i> Analytics</a>
      </nav>
    </div>

    <!-- Main Content -->
    <div class="flex-1 p-8 overflow-auto">
      <div class="flex justify-between items-center mb-8">
        <div>
          <h1 class="text-3xl font-bold">Welcome back, Sarah 👋</h1>
          <p class="text-zinc-500">12 stamps this month • 8 verified</p>
        </div>
        <button onclick="window.location.href='upload.html'" class="bg-blue-600 text-white px-6 py-3 rounded-2xl flex items-center gap-2 hover:bg-blue-700">
          <i class="fas fa-plus"></i> Stamp New Content
        </button>
      </div>

      <h2 class="text-xl font-semibold mb-4">Recent Stamps</h2>
      <div class="grid grid-cols-3 gap-6">
        <!-- Card 1 -->
        <div class="bg-white rounded-3xl overflow-hidden shadow-sm border">
          <img src="https://picsum.photos/id/1015/600/300" class="w-full h-48 object-cover">
          <div class="p-5">
            <p class="font-medium">Morning Light Over Hyderabad</p>
            <p class="text-sm text-green-600">May 1, 2026 • Verified</p>
            <button onclick="window.location.href='proof.html'" class="mt-4 text-blue-600 text-sm font-medium">View Proof →</button>
          </div>
        </div>
        <!-- Card 2 & 3 similar -->
        <div class="bg-white rounded-3xl overflow-hidden shadow-sm border">
          <img src="https://picsum.photos/id/201/600/300" class="w-full h-48 object-cover">
          <div class="p-5">
            <p class="font-medium">Old City Market</p>
            <p class="text-sm text-green-600">April 28, 2026 • Verified</p>
            <button onclick="window.location.href='proof.html'" class="mt-4 text-blue-600 text-sm font-medium">View Proof →</button>
          </div>
        </div>
        <div class="bg-white rounded-3xl overflow-hidden shadow-sm border">
          <img src="https://picsum.photos/id/301/600/300" class="w-full h-48 object-cover">
          <div class="p-5">
            <p class="font-medium">Golden Hour Portrait</p>
            <p class="text-sm text-green-600">April 25, 2026 • Verified</p>
            <button onclick="window.location.href='proof.html'" class="mt-4 text-blue-600 text-sm font-medium">View Proof →</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
