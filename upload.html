<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stamp New Content - TruthStamp</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-zinc-50 min-h-screen flex items-center justify-center">
  <div class="max-w-2xl w-full bg-white rounded-3xl shadow-xl p-12">
    <h1 class="text-3xl font-bold text-center mb-2">Create New TruthStamp</h1>
    <p class="text-center text-zinc-500 mb-10">Your content will be hashed and timestamped instantly on MegaETH</p>

    <div id="dropzone" class="border-2 border-dashed border-zinc-300 rounded-2xl h-80 flex flex-col items-center justify-center hover:border-blue-400 transition-colors cursor-pointer">
      <i class="fas fa-cloud-upload-alt text-6xl text-zinc-400 mb-4"></i>
      <p class="text-xl font-medium">Drop your content here</p>
      <p class="text-zinc-500">or click to browse</p>
      <p class="text-xs text-zinc-400 mt-6">Images, PDF, Text, Video, Audio</p>
    </div>

    <div class="mt-8 space-y-4">
      <input type="text" placeholder="Title (optional)" class="w-full px-5 py-4 border rounded-2xl">
      <textarea placeholder="Description (optional)" class="w-full px-5 py-4 border rounded-2xl h-24"></textarea>
    </div>

    <button onclick="window.location.href='proof.html'" class="w-full mt-8 bg-blue-600 text-white py-5 rounded-2xl text-lg font-semibold hover:bg-blue-700">
      Stamp Now
    </button>
  </div>
</body>
</html>
